server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: config-server
  profiles:
    active: native
  security:
    user:
      name: ${CONFIG_SERVER_USER:config-admin}
      password: ${CONFIG_SERVER_PASSWORD:dev-only-pass-change-me}
      roles: CONFIG_CLIENT
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
