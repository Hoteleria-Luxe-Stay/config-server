spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ---- HikariCP tuning (Round 7) ----
    hikari:
      pool-name: ${HIKARI_POOL_NAME:notificacion-pool}
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:5000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1500000}
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT:2000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:30000}
      keepalive-time: ${HIKARI_KEEPALIVE:120000}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${KAFKA_NOTIFICATION_GROUP_ID:notificacion-service}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.hotel.notificacion.internal.events
        spring.json.value.default.type: com.hotel.notificacion.internal.events.ReservaNotificationEvent

klab:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from-email: ${MAIL_FROM_EMAIL:${MAIL_USERNAME:}}
    from-name: ${MAIL_FROM_NAME:LuxeStay}
    start-tls: ${MAIL_STARTTLS:true}

server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /api/v1

application:
  security:
    jwt:
      public-key: ${JWT_PUBLIC_KEY}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  support:
    email: ${SUPPORT_EMAIL}
  kafka:
    topics:
      reserva-notifications: ${KAFKA_RESERVA_NOTIFICATIONS_TOPIC:reserva.notifications}
  rabbitmq:
    contacto:
      exchange: ${APP_RABBITMQ_CONTACTO_EXCHANGE:contacto.exchange}
      queue: ${APP_RABBITMQ_CONTACTO_QUEUE:contacto.queue}
      routing-key: ${APP_RABBITMQ_CONTACTO_ROUTING_KEY:contacto.routing-key}
    sesion:
      exchange: ${RABBITMQ_SESION_EXCHANGE:hotel.events}
      queue: ${RABBITMQ_SESION_QUEUE:notification.events.queue}
      routing-key: ${RABBITMQ_SESION_ROUTING_KEY:user.#}
  notifications:
    reserva:
      enabled: ${NOTIFICATION_RESERVA_ENABLED:true}
    sesion:
      enabled: ${NOTIFICATION_SESION_ENABLED:true}
    contacto:
      enabled: ${NOTIFICATION_CONTACTO_ENABLED:true}

internal:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://auth-service}
    client-id: ${AUTH_SERVICE_CLIENT_ID}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-service:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
