spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ---- HikariCP tuning (Round 7) ----
    hikari:
      pool-name: ${HIKARI_POOL_NAME:pago-pool}
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:5000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1500000}
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT:2000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:30000}
      keepalive-time: ${HIKARI_KEEPALIVE:120000}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:GSSAPI}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /api/v1

application:
  security:
    jwt:
      public-key: ${JWT_PUBLIC_KEY}
      # Round 9 hardening: validar iss + aud en cada JWT entrante.
      issuer: ${JWT_ISSUER:luxe-stay-auth}
      audience: ${JWT_AUDIENCE:luxe-stay-services}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET}
  # URL publica (ngrok en local, dominio HTTPS en prod) que MP llama para notificar pagos.
  notification-url: ${MERCADOPAGO_NOTIFICATION_URL}
  # Flag explicita: true en local con access token TEST (usa sandboxInitPoint y NO
  # setea auto_return porque las back_urls son localhost). false en prod con access
  # token PROD (usa initPoint y activa auto_return="approved"). Default: false (prod).
  use-sandbox: ${MERCADOPAGO_USE_SANDBOX:false}

app:
  pago:
    default-currency: ${PAGO_DEFAULT_CURRENCY:PEN}
    success-url: ${PAGO_SUCCESS_URL:http://localhost:4200/reservas/success}
    cancel-url: ${PAGO_CANCEL_URL:http://localhost:4200/reservas/cancel}
  kafka:
    topics:
      pago-events: ${KAFKA_PAGO_EVENTS_TOPIC:pago.events}
  # ----------------------------------------------------------------
  # Outbox Pattern (Round 6) — resuelve dual-write Kafka + DB.
  # El relay job publica en lotes; el cleanup borra los enviados +7d.
  # ----------------------------------------------------------------
  outbox:
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    send-timeout-ms: ${OUTBOX_SEND_TIMEOUT_MS:5000}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:10}
    relay:
      fixed-delay-ms: ${OUTBOX_RELAY_FIXED_DELAY_MS:2000}
      initial-delay-ms: ${OUTBOX_RELAY_INITIAL_DELAY_MS:5000}
    cleanup:
      cron: ${OUTBOX_CLEANUP_CRON:0 0 3 * * *}
      retention-days: ${OUTBOX_CLEANUP_RETENTION_DAYS:7}

eureka:
  client:
    service-url:
      # Round 9 hardening: Eureka con basic auth. Creds embebidas en URL.
      defaultZone: ${EUREKA_URL:http://eureka-admin:dev-only-pass-change-me@discovery-service:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents,retries,retryevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# ----------------------------------------------------------------------------
# Resilience4j — protege llamadas al SDK de MercadoPago (createCheckoutSession,
# verifyAndResolveWebhook). Si MP API se ralentiza o falla, el CB abre y los
# siguientes calls reciben fail-fast via fallback method en MercadoPagoGateway.
#
# slowCallDurationThreshold: 30s → MP API puede tardar legitimamente 5-15s
#   bajo carga; consideramos slow >30s para evitar abrir el CB sin necesidad.
# recordExceptions: solo PagoGatewayException — MP-specific failures cuentan.
# ignoreExceptions: WebhookValidationException — HMAC malo es culpa del request,
#   NO del downstream; no cuenta como falla del CB.
# Retry: 3 intentos con espera de 1s entre cada uno (default exponential).
# ----------------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 30s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - com.hotel.pago.helpers.exceptions.PagoGatewayException
        ignoreExceptions:
          - com.hotel.pago.helpers.exceptions.WebhookValidationException
    instances:
      cb-mercadopago:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - com.hotel.pago.helpers.exceptions.PagoGatewayException
        ignoreExceptions:
          - com.hotel.pago.helpers.exceptions.WebhookValidationException
    instances:
      cb-mercadopago:
        baseConfig: default

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
