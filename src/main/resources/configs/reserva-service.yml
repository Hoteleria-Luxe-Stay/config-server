spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ---- HikariCP tuning (Round 7) ----
    hikari:
      pool-name: ${HIKARI_POOL_NAME:reserva-pool}
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:5000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1500000}
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT:2000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:30000}
      keepalive-time: ${HIKARI_KEEPALIVE:120000}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${KAFKA_RESERVA_CONSUMER_GROUP:reserva-service}
      auto-offset-reset: earliest
      enable-auto-commit: false

server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /api/v1

application:
  security:
    jwt:
      public-key: ${JWT_PUBLIC_KEY}
      # Round 9 hardening: validar iss + aud en cada JWT entrante.
      issuer: ${JWT_ISSUER:luxe-stay-auth}
      audience: ${JWT_AUDIENCE:luxe-stay-services}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  kafka:
    topics:
      reserva-notifications: ${KAFKA_RESERVA_NOTIFICATIONS_TOPIC:reserva.notifications}
      pago-events: ${KAFKA_PAGO_EVENTS_TOPIC:pago.events}
  pago:
    # Round 9: unificado a PEN para matchear pago-service.yml. Antes era USD (bug).
    default-currency: ${PAGO_DEFAULT_CURRENCY:PEN}
    success-url: ${PAGO_SUCCESS_URL:http://localhost:4200/reservas/success}
    cancel-url: ${PAGO_CANCEL_URL:http://localhost:4200/reservas/cancel}
  jobs:
    expirar-reservas:
      fixed-delay-ms: ${JOBS_EXPIRAR_RESERVAS_FIXED_DELAY_MS:30000}
      initial-delay-ms: ${JOBS_EXPIRAR_RESERVAS_INITIAL_DELAY_MS:30000}
  # ----------------------------------------------------------------
  # Outbox Pattern (Round 6)
  # ----------------------------------------------------------------
  outbox:
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    send-timeout-ms: ${OUTBOX_SEND_TIMEOUT_MS:5000}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:10}
    relay:
      fixed-delay-ms: ${OUTBOX_RELAY_FIXED_DELAY_MS:2000}
      initial-delay-ms: ${OUTBOX_RELAY_INITIAL_DELAY_MS:5000}
    cleanup:
      cron: ${OUTBOX_CLEANUP_CRON:0 0 3 * * *}
      retention-days: ${OUTBOX_CLEANUP_RETENTION_DAYS:7}

internal:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://auth-service}
    client-id: ${AUTH_SERVICE_CLIENT_ID}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET}
  hotel-service:
    url: ${HOTEL_SERVICE_URL:http://hotel-service}
  pago-service:
    url: ${PAGO_SERVICE_URL:http://pago-service:8085}

eureka:
  client:
    service-url:
      # Round 9 hardening: Eureka con basic auth. Creds embebidas en URL.
      defaultZone: ${EUREKA_URL:http://eureka-admin:dev-only-pass-change-me@discovery-service:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents,retries,retryevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
    instances:
      hotelService:
        baseConfig: default
      authService:
        baseConfig: default
        slidingWindowSize: 5
        failureRateThreshold: 60
      pagoService:
        baseConfig: default
        slidingWindowSize: 8
        failureRateThreshold: 60
        slowCallDurationThreshold: 8s
        waitDurationInOpenState: 60s
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
    instances:
      hotelService:
        baseConfig: default
      authService:
        baseConfig: default
      pagoService:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 1s

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
