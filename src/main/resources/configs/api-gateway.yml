server:
  port: ${SERVER_PORT:8080}

spring:
  main:
    web-application-type: reactive
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - ${CORS_ALLOWED_ORIGINS}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "Authorization"
              - "Content-Type"
            allowCredentials: true
            maxAge: 3600

      routes:
        # ============================================================
        # AUTH — endpoints publicos sensibles (rate limit por IP)
        # Orden: las mas especificas primero (Spring Cloud Gateway matchea por orden)
        # CircuitBreaker dedicado: cb-auth — aislamiento por servicio downstream.
        # ============================================================
        - id: auth-password-reset
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/password/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: cb-auth
                fallbackUri: forward:/fallback/auth-service

        - id: auth-login-register
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/refresh,/api/v1/auth/validate
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: cb-auth
                fallbackUri: forward:/fallback/auth-service

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-auth
                fallbackUri: forward:/fallback/auth-service

        - id: auth-service-oauth
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/oauth/token
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 15
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: cb-auth
                fallbackUri: forward:/fallback/auth-service

        - id: auth-service-users
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-auth
                fallbackUri: forward:/fallback/auth-service

        # ============================================================
        # HOTELES — lectura publica. CircuitBreaker dedicado: cb-hotel.
        # ============================================================
        - id: hotel-service-hoteles
          uri: lb://hotel-service
          predicates:
            - Path=/api/v1/hoteles/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-hotel
                fallbackUri: forward:/fallback/hotel-service

        - id: hotel-service-departamentos
          uri: lb://hotel-service
          predicates:
            - Path=/api/v1/departamentos/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-hotel
                fallbackUri: forward:/fallback/hotel-service

        - id: hotel-service-habitaciones
          uri: lb://hotel-service
          predicates:
            - Path=/api/v1/habitaciones/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-hotel
                fallbackUri: forward:/fallback/hotel-service

        - id: hotel-service-tipos
          uri: lb://hotel-service
          predicates:
            - Path=/api/v1/tipos-habitacion/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-hotel
                fallbackUri: forward:/fallback/hotel-service

        # ============================================================
        # RESERVAS — autenticadas. CircuitBreaker dedicado: cb-reserva.
        # ============================================================
        - id: reserva-service-reservas
          uri: lb://reserva-service
          predicates:
            - Path=/api/v1/reservas/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-reserva
                fallbackUri: forward:/fallback/reserva-service

        - id: reserva-service-mis-reservas
          uri: lb://reserva-service
          predicates:
            - Path=/api/v1/mis-reservas/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-reserva
                fallbackUri: forward:/fallback/reserva-service

        - id: reserva-service-clientes
          uri: lb://reserva-service
          predicates:
            - Path=/api/v1/clientes/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-reserva
                fallbackUri: forward:/fallback/reserva-service

        - id: reserva-service-dashboard
          uri: lb://reserva-service
          predicates:
            - Path=/api/v1/dashboard/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-reserva
                fallbackUri: forward:/fallback/reserva-service

        - id: reserva-service-admin
          uri: lb://reserva-service
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-reserva
                fallbackUri: forward:/fallback/reserva-service

        # ============================================================
        # NOTIFICACIONES — autenticadas (rate limit por userId)
        # /contacto es publico — overridemos a IP.
        # CircuitBreaker dedicado: cb-notificacion.
        # ============================================================
        - id: notificacion-service-contacto
          uri: lb://notificacion-service
          predicates:
            - Path=/api/v1/contacto/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: cb-notificacion
                fallbackUri: forward:/fallback/notificacion-service

        - id: notificacion-service
          uri: lb://notificacion-service
          predicates:
            - Path=/api/v1/notificaciones/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-notificacion
                fallbackUri: forward:/fallback/notificacion-service

        - id: notificacion-service-mis
          uri: lb://notificacion-service
          predicates:
            - Path=/api/v1/mis-notificaciones/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-notificacion
                fallbackUri: forward:/fallback/notificacion-service

        - id: notificacion-service-plantillas
          uri: lb://notificacion-service
          predicates:
            - Path=/api/v1/plantillas/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-notificacion
                fallbackUri: forward:/fallback/notificacion-service

        # ============================================================
        # PAGO — webhook publico (sin JWT, validado por HMAC en ms-pago).
        # Rate limit DEDICADO por IP: si MP nos envia un retry storm o
        # un atacante intenta saturarnos con payloads basura, frenamos
        # antes de gastar CPU en HMAC + queries a MP API.
        # IMPORTANTE: esta route DEBE ir antes de pago-service para que
        # matchee primero (Spring Cloud Gateway respeta orden).
        # CircuitBreaker dedicado: cb-pago.
        # ============================================================
        - id: pago-service-webhook
          uri: lb://pago-service
          predicates:
            - Path=/api/v1/pagos/webhook/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_WEBHOOK_REPLENISH:5}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_WEBHOOK_BURST:10}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: cb-pago
                fallbackUri: forward:/fallback/pago-service

        - id: pago-service
          uri: lb://pago-service
          predicates:
            - Path=/api/v1/pagos/**
          filters:
            - name: CircuitBreaker
              args:
                name: cb-pago
                fallbackUri: forward:/fallback/pago-service

      # default-filters aplican a TODAS las routes. Solo dejamos los
      # transversales (rate-limit + dedupe). El CircuitBreaker NO va aca:
      # cada route define su CB dedicado por servicio downstream
      # (cb-auth, cb-hotel, cb-reserva, cb-pago, cb-notificacion). Asi
      # un servicio caido (ej. pago) no abre el circuito de los demas.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${RATE_LIMIT_DEFAULT_REPLENISH:10}
            redis-rate-limiter.burstCapacity: ${RATE_LIMIT_DEFAULT_BURST:30}
            redis-rate-limiter.requestedTokens: 1

# Resilience4j - configuracion compartida + 1 instancia por servicio downstream.
# Aislamiento bulkhead: si un servicio se cae, su CB abre sin tumbar a los otros.
# Sliding window basado en 10 calls; si >50% fallan o lentas (>5s), abre.
# En estado open, todas las requests van directo a fallbackUri por 30s, despues
# pasa a half-open (permite algunas requests de prueba). Si pasan, vuelve a closed.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      cb-auth:
        base-config: default
      cb-hotel:
        base-config: default
      cb-reserva:
        base-config: default
      cb-pago:
        base-config: default
      cb-notificacion:
        base-config: default

application:
  security:
    jwt:
      public-key: ${JWT_PUBLIC_KEY}
      # Round 9 hardening: validar iss + aud en cada JWT entrante.
      issuer: ${JWT_ISSUER:luxe-stay-auth}
      audience: ${JWT_AUDIENCE:luxe-stay-services}

# ----------------------------------------------------------------------------
# Idempotency-Key (Round 5.3)
# Endpoints sensibles que requieren header 'Idempotency-Key' (UUID v4).
# Soporta path exacto o prefijo con '/**' al final.
# TTL del cache: 24h por default — suficiente para reintentos y forensics.
# ----------------------------------------------------------------------------
idempotency:
  protected-paths:
    - /api/v1/reservas
    - /api/v1/reservas/*/iniciar-pago
  ttl-hours: ${IDEMPOTENCY_TTL_HOURS:24}

eureka:
  client:
    service-url:
      # Round 9 hardening: Eureka con basic auth. Creds embebidas en URL.
      defaultZone: ${EUREKA_URL:http://eureka-admin:dev-only-pass-change-me@discovery-service:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}
    reactor.netty: ${LOG_LEVEL_NETTY:INFO}
